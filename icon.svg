<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4f8a"/>
      <stop offset="100%" style="stop-color:#0a2340"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Left coin -->
  <circle cx="160" cy="256" r="90" fill="#2171c7" opacity="0.9"/>
  <circle cx="160" cy="256" r="74" fill="none" stroke="white" stroke-width="8" opacity="0.6"/>
  <text x="160" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="white">$</text>

  <!-- Right coin -->
  <circle cx="352" cy="256" r="90" fill="#2171c7" opacity="0.9"/>
  <circle cx="352" cy="256" r="74" fill="none" stroke="white" stroke-width="8" opacity="0.6"/>
  <text x="352" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="white">¥</text>

  <!-- Right arrow (top) -->
  <path d="M218 210 L294 210" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polygon points="294,196 316,210 294,224" fill="white"/>

  <!-- Left arrow (bottom) -->
  <path d="M294 302 L218 302" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polygon points="218,288 196,302 218,316" fill="white"/>
</svg>
